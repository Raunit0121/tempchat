spring.application.name=secure-chat-room

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/secure_chat_room?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server
server.port=8080

# CORS - allow both vite dev ports
cors.allowed-origins=http://localhost:5173,http://localhost:5174
